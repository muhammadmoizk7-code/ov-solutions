<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Demo | OneView Solutions</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- NAV -->
<header class="nav">
  <div class="logo">OneView <span>Solutions</span></div>

  <nav>
    <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
  </nav>
</header>

<!-- PAGE -->
<section class="hero">

  <!-- LEFT -->
  <div class="hero-left">

    <h1>WebRTC Softphone Console</h1>

    <p style="color:#94a3b8;">
      Secure SIP / WebRTC communication panel for enterprise calling system
    </p>

    <!-- SOFTPHONE -->
    <div class="glass-box softphone">

      <!-- STATUS -->
      <div class="sp-status">
        <span class="dot"></span>
        <span>Connected • WebRTC Active</span>
      </div>

      <!-- SCREEN -->
      <div class="sp-screen">
        <div class="sp-number">+92 334 3713106</div>
        <div class="sp-label">Ready to Dial</div>
      </div>

      <!-- KEYPAD -->
      <div class="keypad">
        <button>1</button><button>2</button><button>3</button>
        <button>4</button><button>5</button><button>6</button>
        <button>7</button><button>8</button><button>9</button>
        <button>*</button><button>0</button><button>#</button>
      </div>

      <!-- CONTROLS -->
      <div class="controls">

        <button class="call">
          <i class="fa-solid fa-phone"></i>
        </button>

        <button class="mute">
          <i class="fa-solid fa-microphone-slash"></i>
        </button>

        <button class="end">
          <i class="fa-solid fa-phone-slash"></i>
        </button>

      </div>

      <!-- FOOT STATUS -->
      <div class="sp-footer">
        <span>📡 SIP Ready</span>
        <span>🎧 Audio OK</span>
      </div>

    </div>

  </div>

</section>

<!-- FOOTER -->
<footer>
  © 2026 OneView Solutions — Powered by OneView Solutions
</footer>

</body>
</html>
